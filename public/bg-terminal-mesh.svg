    <radialGradient id="glowGreen" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(290 180) rotate(90) scale(220 300)">
      <stop stop-color="#52FFA8" stop-opacity=".18"/>
